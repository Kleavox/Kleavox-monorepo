  <path d="M690,195 L690,182 L703,182" fill="none" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <path d="M1097,182 L1110,182 L1110,195" fill="none" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <path d="M690,425 L690,438 L703,438" fill="none" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <path d="M1097,438 L1110,438 L1110,425" fill="none" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
