  <!-- CH2: MAX30102 PPG (heartbeat) -->
  <path d="M690,352 L760,352 L763,352 L766,332 L769,372 L772,352 L840,352 L843,352 L846,332 L849,372 L852,352 L940,352 L943,352 L946,332 L949,372 L952,352 L1050,352 L1053,352 L1056,332 L1059,372 L1062,352 L1110,352"
        fill="none" stroke="#4ade80" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Panel footer -->
  <text x="698" y="428" font-family="'Courier New',monospace" font-size="10" fill="#35354e">I2C 0x68 · 0x57</text>
