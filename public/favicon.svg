<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#080808"/>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#ff2d2d" stroke-width="1.5" opacity="0.4"/>
  <!-- Inner pulse ring -->
  <circle cx="16" cy="16" r="9" fill="none" stroke="#ff2d2d" stroke-width="1" opacity="0.25"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="4" fill="#ff2d2d"/>
  <!-- Cross hairs -->
  <line x1="16" y1="2" x2="16" y2="8" stroke="#ff2d2d" stroke-width="1.5" opacity="0.6"/>
  <line x1="16" y1="24" x2="16" y2="30" stroke="#ff2d2d" stroke-width="1.5" opacity="0.6"/>
  <line x1="2" y1="16" x2="8" y2="16" stroke="#ff2d2d" stroke-width="1.5" opacity="0.6"/>
  <line x1="24" y1="16" x2="30" y2="16" stroke="#ff2d2d" stroke-width="1.5" opacity="0.6"/>
  <!-- Corner ticks -->
  <line x1="5" y1="5" x2="8" y2="8" stroke="#ff2d2d" stroke-width="1" opacity="0.35"/>
  <line x1="27" y1="5" x2="24" y2="8" stroke="#ff2d2d" stroke-width="1" opacity="0.35"/>
  <line x1="5" y1="27" x2="8" y2="24" stroke="#ff2d2d" stroke-width="1" opacity="0.35"/>
  <line x1="27" y1="27" x2="24" y2="24" stroke="#ff2d2d" stroke-width="1" opacity="0.35"/>
</svg>
