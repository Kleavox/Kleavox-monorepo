<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!--
    Italic bold D — no transform, coordinates hand-calculated with ~5deg italic lean.
    At y=5 (top): x shifts +1.5 right vs y=27 (bottom) due to italic
    Outer D shape (clockwise):
      top-left of spine → top-right of top bar → bowl curve → bottom-right → bottom-left → back up spine
    Inner cutout (counter-clockwise) creates the counter of the D.
  -->
  <path
    fill="#dedede"
    d="
      M 5.5,5
      L 18,5
      Q 28,5 28,16
      Q 28,27 16,27
      L 4,27
      L 6,23
      L 8,23
      Q 19,23 19,16
      Q 19,9 8.5,9
      L 7.5,9
      Z
    "
  />

  <!--
    Live dot: top-right quadrant, red filled circle + 4 short rays (plus shape)
    Dot center: (25, 6.5), radius 3
  -->
  <circle cx="25" cy="6.5" r="3" fill="#ff2d2d"/>
  <!-- top -->
  <line x1="25"   y1="1"   x2="25"   y2="3"   stroke="#ff2d2d" stroke-width="1.8" stroke-linecap="round"/>
  <!-- bottom -->
  <line x1="25"   y1="10"  x2="25"   y2="12"  stroke="#ff2d2d" stroke-width="1.8" stroke-linecap="round"/>
  <!-- left -->
  <line x1="19.5" y1="6.5" x2="21.5" y2="6.5" stroke="#ff2d2d" stroke-width="1.8" stroke-linecap="round"/>
  <!-- right -->
  <line x1="28.5" y1="6.5" x2="30.5" y2="6.5" stroke="#ff2d2d" stroke-width="1.8" stroke-linecap="round"/>
</svg>
