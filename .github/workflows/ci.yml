name: Validate

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      javascript: ${{ steps.filter.outputs.javascript }}
      agent: ${{ steps.filter.outputs.agent }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            javascript:
              - "apps/**"
              - "workers/**"
              - "packages/**"
              - "crates/**"
              - "tooling/**"
              - "package.json"
              - "pnpm-lock.yaml"
              - "pnpm-workspace.yaml"
              - "tsconfig.base.json"
              - "turbo.json"
              - ".github/workflows/ci.yml"
            agent:
              - "services/agent/**"
              - ".github/workflows/ci.yml"
              - ".github/workflows/agent-release.yml"

  javascript:
    needs: changes
    if: needs.changes.outputs.javascript == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ github.job }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ github.job }}-${{ github.ref_name }}-
            turbo-${{ github.job }}-

      - run: rustup target add wasm32-unknown-unknown

      - name: Cache wasm-pack binary
        id: cache-wasm-pack
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: wasm-pack-0.15.0-${{ runner.os }}

      - run: cargo install wasm-pack --locked --version 0.15.0
        if: steps.cache-wasm-pack.outputs.cache-hit != 'true'

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cache/.wasm-pack
            crates/crypto/target
            crates/compression/target
          key: rust-${{ runner.os }}-${{ hashFiles('crates/**/Cargo.lock', 'crates/**/Cargo.toml') }}
          restore-keys: |
            rust-${{ runner.os }}-

      - name: Warm wasm-bindgen-cli cache
        run: wasm-pack build --target web --out-dir /tmp/wasm-pack-warmup --release crates/compression --locked

      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm exec turbo run typecheck test build
      - run: pnpm knip

  e2e:
    needs: changes
    if: needs.changes.outputs.javascript == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ github.job }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ github.job }}-${{ github.ref_name }}-
            turbo-${{ github.job }}-

      - run: rustup target add wasm32-unknown-unknown

      - name: Cache wasm-pack binary
        id: cache-wasm-pack
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: wasm-pack-0.15.0-${{ runner.os }}

      - run: cargo install wasm-pack --locked --version 0.15.0
        if: steps.cache-wasm-pack.outputs.cache-hit != 'true'

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cache/.wasm-pack
            crates/crypto/target
            crates/compression/target
          key: rust-${{ runner.os }}-${{ hashFiles('crates/**/Cargo.lock', 'crates/**/Cargo.toml') }}
          restore-keys: |
            rust-${{ runner.os }}-

      - name: Warm wasm-bindgen-cli cache
        run: wasm-pack build --target web --out-dir /tmp/wasm-pack-warmup --release crates/compression --locked

      - run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - run: pnpm --filter @kleavox/e2e exec playwright install --with-deps chromium

      - run: pnpm e2e

  agent:
    needs: changes
    if: needs.changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: services/agent/go.mod

      - run: go test ./...
        working-directory: services/agent

      - run: go build -o bin/kleavox-agent ./cmd/agent
        working-directory: services/agent

      - name: Dead-code check
        working-directory: services/agent
        run: |
          output="$(go run golang.org/x/tools/cmd/deadcode@latest ./...)"
          if [ -n "$output" ]; then
            echo "Dead Go code found:"
            echo "$output"
            exit 1
          fi

  validate:
    name: validate
    if: always()
    needs:
      - changes
      - javascript
      - e2e
      - agent
    runs-on: ubuntu-latest
    steps:
      - name: Confirm required checks passed
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          JAVASCRIPT_RESULT: ${{ needs.javascript.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
          AGENT_RESULT: ${{ needs.agent.result }}
        run: |
          test "$CHANGES_RESULT" = "success"
          test "$JAVASCRIPT_RESULT" = "success" || test "$JAVASCRIPT_RESULT" = "skipped"
          test "$E2E_RESULT" = "success" || test "$E2E_RESULT" = "skipped"
          test "$AGENT_RESULT" = "success" || test "$AGENT_RESULT" = "skipped"
