name: Validate

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      javascript: ${{ steps.filter.outputs.javascript }}
      agent: ${{ steps.filter.outputs.agent }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            javascript:
              - "apps/**"
              - "workers/**"
              - "packages/**"
              - "crates/**"
              - "tooling/**"
              - "package.json"
              - "pnpm-lock.yaml"
              - "pnpm-workspace.yaml"
              - "tsconfig.base.json"
              - "turbo.json"
              - ".github/workflows/ci.yml"
            agent:
              - "services/agent/**"
              - ".github/workflows/ci.yml"
              - ".github/workflows/agent-release.yml"

  javascript:
    needs: changes
    if: needs.changes.outputs.javascript == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ github.job }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ github.job }}-${{ github.ref_name }}-
            turbo-${{ github.job }}-

      - run: rustup target add wasm32-unknown-unknown
      - run: cargo install wasm-pack --locked --version 0.15.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  agent:
    needs: changes
    if: needs.changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: services/agent/go.mod

      - run: go test ./...
        working-directory: services/agent

      - run: go build -o bin/kleavox-agent ./cmd/agent
        working-directory: services/agent

  validate:
    name: validate
    if: always()
    needs:
      - changes
      - javascript
      - agent
    runs-on: ubuntu-latest
    steps:
      - name: Confirm required checks passed
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          JAVASCRIPT_RESULT: ${{ needs.javascript.result }}
          AGENT_RESULT: ${{ needs.agent.result }}
        run: |
          test "$CHANGES_RESULT" = "success"
          test "$JAVASCRIPT_RESULT" = "success" || test "$JAVASCRIPT_RESULT" = "skipped"
          test "$AGENT_RESULT" = "success" || test "$AGENT_RESULT" = "skipped"
