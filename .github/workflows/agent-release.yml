name: Agent Release

on:
  push:
    tags:
      - "agent-v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/agent
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: services/agent/go.mod
          cache-dependency-path: services/agent/go.mod
      - name: Test
        run: go test ./...
      - name: Build Linux binaries
        env:
          CGO_ENABLED: "0"
        run: |
          version="${GITHUB_REF_NAME#agent-v}"
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w -X main.version=${version}" -o kleavox-agent-linux-amd64 ./cmd/agent
          GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w -X main.version=${version}" -o kleavox-agent-linux-arm64 ./cmd/agent
          sha256sum kleavox-agent-linux-amd64 > kleavox-agent-linux-amd64.sha256
          sha256sum kleavox-agent-linux-arm64 > kleavox-agent-linux-arm64.sha256
      - name: Attest amd64 binary
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: services/agent/kleavox-agent-linux-amd64
      - name: Attest arm64 binary
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: services/agent/kleavox-agent-linux-arm64
      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            services/agent/kleavox-agent-linux-amd64
            services/agent/kleavox-agent-linux-amd64.sha256
            services/agent/kleavox-agent-linux-arm64
            services/agent/kleavox-agent-linux-arm64.sha256
