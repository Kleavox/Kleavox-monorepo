name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build WASM
        run: |
          cp "$(go env GOROOT)/lib/wasm/wasm_exec.js" src/wasm_exec.js
          GOOS=js GOARCH=wasm go build -C go -ldflags="-s -w" -o ../src/main.wasm .

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Inject config into wrangler.toml
        run: |
          sed -i "s|YOUR_D1_DATABASE_ID|${{ secrets.D1_DATABASE_ID }}|g" wrangler.toml
          sed -i "s|YOUR_KV_NAMESPACE_ID|${{ secrets.KV_NAMESPACE_ID }}|g" wrangler.toml
          sed -i "s|https://auth.yourdomain.com|${{ secrets.BASE_URL }}|g" wrangler.toml
          sed -i "s|\.yourdomain\.com|${{ secrets.COOKIE_DOMAIN }}|g" wrangler.toml
          sed -i "s|noreply@yourdomain.com|${{ secrets.FROM_EMAIL }}|g" wrangler.toml

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
