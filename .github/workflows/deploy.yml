name: Deploy

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - ".github/workflows/agent.yml"
      - "crates/agent/**"
      - "migrations/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true

      - name: Cache cargo tools
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/trunk
            ~/.cargo/bin/worker-build
          key: cargo-tools-${{ runner.os }}-trunk-0.21-workerbuild-0.8

      - name: Install trunk
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://github.com/trunk-rs/trunk/releases/download/v0.21.14/trunk-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C ~/.cargo/bin

      - name: Install worker-build
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: cargo install worker-build --version 0.8.3 --locked

      - name: Build frontend
        run: trunk build --release --dist ../../dist
        working-directory: crates/web

      - name: Copy static files
        run: |
          mkdir -p dist
          cp install.sh dist/install.sh

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
