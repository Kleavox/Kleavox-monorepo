name: Deploy DeauWait

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Build
      run: npm run build

    - name: Deploy to Kripton
      env:
        SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      run: |
        mkdir -p ~/.ssh
        echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H 8.215.39.50 >> ~/.ssh/known_hosts
        rsync -av --delete \
          -e "ssh -i ~/.ssh/deploy_key" \
          .output/ \
          deploy@8.215.39.50:/var/www/deauwait/

    - name: Restart PM2
      env:
        SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      run: |
        mkdir -p ~/.ssh
        echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh -i ~/.ssh/deploy_key \
          deploy@8.215.39.50 \
          "cat > /var/www/deauwait/ecosystem.config.js << 'EOFPM2'
        module.exports = {
          apps: [{
            name: 'deauwait',
            script: '/var/www/deauwait/server/index.mjs',
            cwd: '/var/www/deauwait',
            env: {
              NODE_ENV: 'production',
              PORT: 8080,
              HOST: '0.0.0.0'
            }
          }]
        }
        EOFPM2
        pm2 reload deauwait || pm2 start /var/www/deauwait/ecosystem.config.js"