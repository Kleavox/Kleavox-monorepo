name: Deploy Kleavox

on:
  workflow_dispatch:
    inputs:
      domains:
        description: Domain attachment stage
        required: true
        type: choice
        default: none
        options:
          - none
          - canonical
      apply_migrations:
        description: Apply pending D1 migrations before deployment
        required: true
        type: boolean
        default: true

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      APP_ROOT_DOMAIN: ${{ vars.APP_ROOT_DOMAIN }}
      WORKER_PREFIX: ${{ vars.WORKER_PREFIX }}
      PASS_D1_ID: ${{ secrets.PASS_D1_ID }}
      PASS_KV_ID: ${{ secrets.PASS_KV_ID }}
      LINK_D1_ID: ${{ secrets.LINK_D1_ID }}
      PULSE_D1_ID: ${{ secrets.PULSE_D1_ID }}
      DROP_D1_ID: ${{ secrets.DROP_D1_ID }}
      DROP_BUCKET_NAME: ${{ vars.DROP_BUCKET_NAME }}
      AUTH_FROM_EMAIL: ${{ vars.AUTH_FROM_EMAIL }}
      PORTFOLIO_FROM_EMAIL: ${{ vars.PORTFOLIO_FROM_EMAIL }}
      AGENT_DOWNLOAD_BASE: https://github.com/${{ github.repository }}/releases/latest/download
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
      IP_HASH_SECRET: ${{ secrets.IP_HASH_SECRET }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GITHUB_CLIENT_ID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
      GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
      GUEST_HASH_SECRET: ${{ secrets.GUEST_HASH_SECRET }}
      DOWNLOAD_SIGNING_SECRET: ${{ secrets.DOWNLOAD_SIGNING_SECRET }}
      PASSWORD_HASH_SECRET: ${{ secrets.PASSWORD_HASH_SECRET }}
      VITE_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
      PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
      VITE_ROOT_ORIGIN: https://${{ vars.APP_ROOT_DOMAIN }}
      VITE_PASS_ORIGIN: https://pass.${{ vars.APP_ROOT_DOMAIN }}
      VITE_LINK_ORIGIN: https://link.${{ vars.APP_ROOT_DOMAIN }}
      VITE_PULSE_ORIGIN: https://pulse.${{ vars.APP_ROOT_DOMAIN }}
      PUBLIC_ROOT_ORIGIN: https://${{ vars.APP_ROOT_DOMAIN }}
      PUBLIC_PORTFOLIO_ORIGIN: https://port.${{ vars.APP_ROOT_DOMAIN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: rustup target add wasm32-unknown-unknown

      - name: Cache wasm-pack binary
        id: cache-wasm-pack
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: wasm-pack-0.15.0-${{ runner.os }}

      - run: cargo install wasm-pack --locked --version 0.15.0
        if: steps.cache-wasm-pack.outputs.cache-hit != 'true'

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cache/.wasm-pack
            crates/crypto/target
            crates/compression/target
          key: rust-${{ runner.os }}-${{ hashFiles('crates/**/Cargo.lock', 'crates/**/Cargo.toml') }}
          restore-keys: |
            rust-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: node tooling/deploy/dist/cli.js render --domains "${{ inputs.domains }}"
      - run: node tooling/deploy/dist/cli.js secrets

      - name: Apply D1 migrations
        if: inputs.apply_migrations
        run: |
          pnpm exec wrangler d1 migrations apply DB --remote --config .wrangler/deploy/pass.json
          pnpm exec wrangler d1 migrations apply DB --remote --config .wrangler/deploy/link.json
          pnpm exec wrangler d1 migrations apply DB --remote --config .wrangler/deploy/pulse.json
          pnpm exec wrangler d1 migrations apply DB --remote --config .wrangler/deploy/drop.json

      - name: Deploy Pass
        run: pnpm exec wrangler deploy --strict --config .wrangler/deploy/pass.json --secrets-file .wrangler/deploy/pass.secrets.json

      - name: Deploy Drop
        run: pnpm exec wrangler deploy --strict --config .wrangler/deploy/drop.json --secrets-file .wrangler/deploy/drop.secrets.json

      - name: Deploy Link
        run: pnpm exec wrangler deploy --strict --config .wrangler/deploy/link.json

      - name: Deploy Portfolio
        run: pnpm exec wrangler deploy --strict --config .wrangler/deploy/portfolio.json --secrets-file .wrangler/deploy/portfolio.secrets.json

      - name: Deploy Pulse
        run: pnpm exec wrangler deploy --strict --config .wrangler/deploy/pulse.json

      - name: Deploy Gateway
        run: pnpm exec wrangler deploy --strict --config .wrangler/deploy/gateway.json

      - name: Verify public services
        if: inputs.domains != 'none'
        env:
          HEALTH_ATTEMPTS: "8"
          HEALTH_DELAY_MS: "15000"
        run: pnpm health:check
